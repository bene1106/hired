# ──────────────────────────────────────────────────────────────────────
#  Hired. — Continuous Integration
#
#  Job split (decided 2026-05-05):
#
#  - `backend-checks` and `frontend-checks` run on EVERY push and PR.
#    They are fast (<2 min each) and catch the vast majority of
#    regressions; making them mandatory keeps `main` healthy.
#
#  - `build` runs the full Tauri build on a 3-OS matrix and is
#    EXPENSIVE (~10-15 min per OS, ~45 min total). To keep CI minutes
#    reasonable it only triggers on:
#      * pull_request to `main`     (gates merges)
#      * tag pushes matching v*     (release builds)
#    Day-to-day pushes to feature branches do NOT spend the build
#    budget — only the merge into `main` does.
# ──────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: pytest
        run: uv run pytest -q

  frontend-checks:
    name: Frontend (lint + typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Prettier check
        run: pnpm format:check

      - name: Vitest
        run: pnpm test

  build:
    name: Tauri build (${{ matrix.os }})
    # Gated: PRs to main + tag pushes only — see header comment.
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    needs: [backend-checks, frontend-checks]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build
        # Until src-tauri/ exists (added in task #5) we just verify the
        # frontend production bundle builds on every supported OS. Once
        # task #5 lands, this step becomes `pnpm tauri build` from the
        # repo root.
        # TODO(phase-1, task #5): replace with `pnpm tauri build`
        run: pnpm build
        working-directory: frontend
