# ──────────────────────────────────────────────────────────────────────
#  Hired. — Continuous Integration
#
#  Job split (decided 2026-05-05):
#
#  - `backend-checks` and `frontend-checks` run on EVERY push and PR.
#    They are fast (<2 min each) and catch the vast majority of
#    regressions; making them mandatory keeps `main` healthy.
#
#  - `build` runs the full Tauri build on a 3-OS matrix and is
#    EXPENSIVE (~10-15 min per OS, ~45 min total). To keep CI minutes
#    reasonable it only triggers on:
#      * pull_request to `main`     (gates merges)
#      * tag pushes matching v*     (release builds)
#    Day-to-day pushes to feature branches do NOT spend the build
#    budget — only the merge into `main` does.
# ──────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: pytest
        run: uv run pytest -q

      # The committed OpenAPI schema went stale once (2026-05-29 → 2026-06-25,
      # 19 missing paths). Regenerate and fail if it differs from the commit.
      - name: OpenAPI schema is current
        run: |
          HIRED_DB_URL=sqlite:///./scratch-openapi.db \
            uv run python ../scripts/gen_openapi.py
          git diff --exit-code ../docs/api.openapi.json

  frontend-checks:
    name: Frontend (lint + typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Prettier check
        run: pnpm format:check

      - name: Vitest
        run: pnpm test

  build:
    name: Tauri build (${{ matrix.os }})
    # Gated: PRs to main + tag pushes only — see header comment.
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    needs: [backend-checks, frontend-checks]
    strategy:
      fail-fast: false
      # `tauri.conf.json` declares bundle.externalBin: ["binaries/hired-sidecar"],
      # so EVERY `tauri build` (this gate build too, not just release.yml)
      # needs the PyInstaller-built sidecar staged with the Rust
      # target-triple suffix Tauri resolves at bundle time. The triple
      # must match the host the build runs on:
      #   ubuntu-latest  → x86_64-unknown-linux-gnu
      #   macos-latest   → aarch64-apple-darwin (Apple-Silicon runners)
      #   windows-latest → x86_64-pc-windows-msvc  (+ .exe)
      matrix:
        include:
          - os: ubuntu-latest
            target_triple: x86_64-unknown-linux-gnu
            sidecar_ext: ""
          - os: macos-latest
            target_triple: aarch64-apple-darwin
            sidecar_ext: ""
          - os: windows-latest
            target_triple: x86_64-pc-windows-msvc
            sidecar_ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target_triple }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install backend deps (incl. pyinstaller)
        run: uv sync --frozen
        working-directory: backend

      - name: Build sidecar with PyInstaller
        run: uv run pyinstaller hired-sidecar.spec --clean --noconfirm
        working-directory: backend

      - name: Stage sidecar for Tauri (POSIX)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp backend/dist/hired-sidecar${{ matrix.sidecar_ext }} \
             src-tauri/binaries/hired-sidecar-${{ matrix.target_triple }}${{ matrix.sidecar_ext }}
          chmod +x src-tauri/binaries/hired-sidecar-${{ matrix.target_triple }}${{ matrix.sidecar_ext }}

      - name: Stage sidecar for Tauri (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item `
            "backend/dist/hired-sidecar${{ matrix.sidecar_ext }}" `
            "src-tauri/binaries/hired-sidecar-${{ matrix.target_triple }}${{ matrix.sidecar_ext }}"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install root deps (Tauri CLI)
        run: pnpm install --frozen-lockfile

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Tauri build
        run: pnpm tauri build --target ${{ matrix.target_triple }}

      # Make the PR-gate build downloadable. Without this the gate only
      # proves the build compiles — there's no installer to hand-test.
      # Needed for the v0.1.1 sidecar-fetch hotfix loop (push → CI →
      # download → test) without spamming release tags. The bundle dir
      # holds the per-OS installer(s): NSIS/MSI on Windows, dmg/app on
      # macOS, AppImage/deb on Linux.
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target_triple }}
          path: src-tauri/target/${{ matrix.target_triple }}/release/bundle/
          if-no-files-found: error
          retention-days: 14
