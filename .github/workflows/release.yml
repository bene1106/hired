# ──────────────────────────────────────────────────────────────────────
#  Hired. — Cross-platform release builds
#
#  Triggers on a `v*` tag push (e.g. `git tag v1.0.0 && git push --tags`)
#  and produces installers for macOS / Windows / Linux on a GitHub
#  release.
#
#  Pipeline per OS:
#    1. Build the FastAPI sidecar with PyInstaller from
#       backend/hired-sidecar.spec → backend/dist/hired-sidecar(.exe)
#    2. Rename the binary with the target's Tauri triple suffix and
#       copy it to src-tauri/binaries/ — that's the path declared as
#       `bundle.externalBin` in tauri.conf.json.
#    3. `tauri-action` runs `pnpm tauri build` and uploads the
#       generated installers to the GitHub release.
#
#  Code signing: not configured. macOS and Windows builds are unsigned
#  — see docs/install/{macos,windows}.md for the right-click-Open /
#  SmartScreen workarounds. Wiring signing in is a configuration-only
#  follow-up once the team has certs.
#
#  Expect the first 1-2 runs of this workflow to fail on macOS and
#  Linux as missing PyInstaller hidden imports surface; iterate on
#  backend/hired-sidecar.spec when they do. The Windows path is the
#  one we have a dev box for, so it should be the most stable.
# ──────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Release build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target_triple: aarch64-apple-darwin
            sidecar_ext: ""
          - os: ubuntu-latest
            target_triple: x86_64-unknown-linux-gnu
            sidecar_ext: ""
          - os: windows-latest
            target_triple: x86_64-pc-windows-msvc
            sidecar_ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target_triple }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install backend deps (incl. pyinstaller)
        run: uv sync --frozen
        working-directory: backend

      - name: Build sidecar with PyInstaller
        run: uv run pyinstaller hired-sidecar.spec --clean --noconfirm
        working-directory: backend

      - name: Stage sidecar for Tauri (POSIX)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp backend/dist/hired-sidecar${{ matrix.sidecar_ext }} \
             src-tauri/binaries/hired-sidecar-${{ matrix.target_triple }}${{ matrix.sidecar_ext }}
          chmod +x src-tauri/binaries/hired-sidecar-${{ matrix.target_triple }}${{ matrix.sidecar_ext }}

      - name: Stage sidecar for Tauri (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item `
            "backend/dist/hired-sidecar${{ matrix.sidecar_ext }}" `
            "src-tauri/binaries/hired-sidecar-${{ matrix.target_triple }}${{ matrix.sidecar_ext }}"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install root deps (Tauri CLI)
        run: pnpm install --frozen-lockfile

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build & publish via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Hired. ${{ github.ref_name }}"
          releaseBody: |
            See `docs/CHANGELOG.md` for what changed.

            **Unsigned build notice.** Until we ship a Developer ID /
            EV cert, your OS will warn the first time you launch:
            - macOS: right-click → Open. See `docs/install/macos.md`.
            - Windows: SmartScreen → More info → Run anyway. See
              `docs/install/windows.md`.

            Linux ships AppImage + .deb. See `docs/install/linux.md`.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target_triple }}
