<style>
  :root {
    /* Light — Warm off-white + deep ink + muted green */
    --bg: #F6F3EE;          /* warm off-white, paper */
    --bg-sunk: #EFEBE3;     /* recessed surfaces */
    --surface: #FFFDF9;     /* cards */
    --surface-2: #FAF6EF;   /* inputs */
    --line: #E4DED2;
    --line-strong: #CFC7B6;
    --ink: #1A1A17;         /* deep near-black ink */
    --ink-2: #3A3832;
    --ink-3: #6B6A62;
    --ink-4: #9A988E;
    --accent: #4F6B4A;      /* muted green */
    --accent-2: #6E8A65;
    --accent-soft: #DDE5D3;
    --accent-tint: #EBF0E2;
    --warn: #B5571E;        /* warm terracotta for skip/reject */
    --warn-soft: #F1E0D3;
    --brand-orange: #ff6b35; /* logo accent dot */
    --brand-ink: #1a1a1a;    /* logo mark fill */
    --info: #5B6F86;
    --info-soft: #DEE5EE;

    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 16px;

    --shadow-sm: 0 1px 0 rgba(26,26,23,0.04), 0 1px 2px rgba(26,26,23,0.04);
    --shadow-md: 0 2px 6px rgba(26,26,23,0.05), 0 8px 24px rgba(26,26,23,0.04);
    --shadow-lg: 0 12px 40px rgba(26,26,23,0.08), 0 2px 6px rgba(26,26,23,0.04);

    --sans: "Inter Tight", -apple-system, BlinkMacSystemFont, "Helvetica Neue", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  html[data-theme="dark"] {
    --bg: #111110;
    --bg-sunk: #0B0B0A;
    --surface: #1A1A18;
    --surface-2: #222220;
    --line: #2A2A27;
    --line-strong: #3A3A36;
    --ink: #F2EFE8;
    --ink-2: #D6D3CB;
    --ink-3: #9A988E;
    --ink-4: #6B6A62;
    --accent: #9BB690;
    --accent-2: #B9CFB0;
    --accent-soft: #2A3528;
    --accent-tint: #1E2A1C;
    --warn: #D98A56;
    --warn-soft: #3A271B;
    --brand-orange: #ff8a5b;
    --brand-ink: #ffffff;
    --info: #93A6BD;
    --info-soft: #233140;
    --shadow-sm: 0 1px 0 rgba(0,0,0,0.3);
    --shadow-md: 0 2px 6px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.2);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.2);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.5;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }
  ::selection { background: var(--accent-soft); color: var(--ink); }

  /* Reusable utilities */
  .mono { font-family: var(--mono); font-feature-settings: "tnum"; }
  .tnum { font-variant-numeric: tabular-nums; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 10px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* App shell */
  .app { display: grid; grid-template-columns: 244px 1fr; min-height: 100vh; }
  .shell-main { min-width: 0; background: var(--bg); }

  /* Ring reveal animation */
  @keyframes ring-fill {
    from { stroke-dashoffset: var(--from); }
    to { stroke-dashoffset: var(--to); }
  }
  @keyframes subtle-bounce {
    0% { transform: scale(1); }
    40% { transform: scale(1.08); }
    70% { transform: scale(0.97); }
    100% { transform: scale(1); }
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: .35; }
    50% { opacity: 1; }
  }
  .fade-up { animation: fade-up .5s ease both; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; right: 20px; bottom: 20px; z-index: 50;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius-lg); padding: 14px 16px;
    box-shadow: var(--shadow-lg);
    min-width: 240px;
    display: none;
  }
  .tweaks-panel.open { display: block; animation: fade-up .25s ease both; }
  .tweaks-title { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 10px;}

  /* Generic bits */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px; border-radius: 999px;
    font-size: 12px; font-weight: 500;
    background: var(--surface-2); border: 1px solid var(--line); color: var(--ink-2);
  }
  .chip.green { background: var(--accent-tint); border-color: var(--accent-soft); color: var(--accent); }
  .chip.warn { background: var(--warn-soft); border-color: var(--warn-soft); color: var(--warn); }
  .chip.info { background: var(--info-soft); border-color: var(--info-soft); color: var(--info); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 8px 14px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500;
    background: var(--surface); border: 1px solid var(--line); color: var(--ink);
    transition: background .15s ease, border-color .15s ease, transform .06s ease;
  }
  .btn:hover { background: var(--surface-2); border-color: var(--line-strong); }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn.primary:hover { background: var(--ink-2); border-color: var(--ink-2); }
  .btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.accent:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
  .btn.ghost:hover { background: var(--surface-2); color: var(--ink); }
  .btn.sm { padding: 5px 10px; font-size: 12px; border-radius: var(--radius-sm); }
  .btn.icon { padding: 8px; width: 34px; height: 34px; }

  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
  }
  .card-hover { transition: box-shadow .2s ease, border-color .2s ease, transform .2s ease; }
  .card-hover:hover { box-shadow: var(--shadow-md); border-color: var(--line-strong); }

  .divider { height: 1px; background: var(--line); border: none; margin: 0; }
  .kbd {
    font-family: var(--mono); font-size: 11px;
    padding: 2px 6px; border-radius: 4px;
    background: var(--surface-2); border: 1px solid var(--line); color: var(--ink-3);
  }

  /* Skeleton shimmer */
  .skeleton {
    background: linear-gradient(90deg, var(--surface-2) 0%, var(--line) 50%, var(--surface-2) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.6s linear infinite;
    border-radius: 4px;
  }

  /* Toggle */
  .switch { position: relative; width: 34px; height: 20px; background: var(--line-strong); border-radius: 999px; cursor: pointer; transition: background .2s; }
  .switch::after { content:""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: var(--surface); border-radius: 50%; transition: left .2s; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
  .switch.on { background: var(--accent); }
  .switch.on::after { left: 16px; }

  /* Focus ring */
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

  /* Scroll snap for tab-switch screens */
  .screen { animation: fade-up .35s ease both; }

</style>
