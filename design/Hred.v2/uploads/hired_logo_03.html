<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>hired. — Logo 03</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=JetBrains+Mono:wght@400;700&family=Archivo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f4f1ea;
    font-family: 'Archivo', sans-serif;
    color: #111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    gap: 60px;
  }

  .header {
    text-align: center;
  }
  .header .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #999;
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  /* ========== HAUPT-LOGO (groß) ========== */
  .hero {
    background: #fff;
    border-radius: 6px;
    padding: 100px 80px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 20px 60px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 800px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hero .container {
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .hero .mark {
    width: 110px;
    height: 110px;
    background: #1a1a1a;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .hero .mark::after {
    content: '';
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #ff6b35;
    position: absolute;
    bottom: 18px;
    right: 18px;
  }
  .hero .mark span {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 58px;
    color: #fff;
    letter-spacing: -0.05em;
  }
  .hero .wordmark {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 84px;
    letter-spacing: -0.04em;
    color: #1a1a1a;
    line-height: 1;
  }
  .hero .dot { color: #ff6b35; }

  /* ========== VARIANTEN-REIHE ========== */
  .variants {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 800px;
  }
  .variant {
    background: #fff;
    border-radius: 6px;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.05);
    position: relative;
  }
  .variant.dark { background: #1a1a1a; }
  .variant .label {
    position: absolute;
    bottom: 12px;
    left: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #999;
  }
  .variant.dark .label { color: #555; }

  /* Mark allein */
  .icon-only {
    width: 90px;
    height: 90px;
    background: #1a1a1a;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-only::after {
    content: '';
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #ff6b35;
    position: absolute;
    bottom: 14px;
    right: 14px;
  }
  .icon-only span {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 48px;
    color: #fff;
    letter-spacing: -0.05em;
  }

  /* Inverse (white-on-dark) */
  .variant.dark .icon-only {
    background: #fff;
  }
  .variant.dark .icon-only span {
    color: #1a1a1a;
  }

  /* Wordmark only */
  .word-only {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 38px;
    letter-spacing: -0.04em;
    color: #1a1a1a;
  }
  .word-only .dot { color: #ff6b35; }
  .variant.dark .word-only { color: #fff; }

  /* Stacked */
  .stacked {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .stacked .mark {
    width: 60px;
    height: 60px;
    background: #1a1a1a;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stacked .mark::after {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ff6b35;
    position: absolute;
    bottom: 9px;
    right: 9px;
  }
  .stacked .mark span {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 32px;
    color: #fff;
    letter-spacing: -0.05em;
  }
  .stacked .wordmark {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: -0.04em;
    color: #1a1a1a;
  }
  .stacked .dot { color: #ff6b35; }
</style>
</head>
<body>

<div class="header">
  <div class="num">CONCEPT 03</div>
  <h1>Mark + Type</h1>
</div>

<!-- Hauptansicht -->
<div class="hero">
  <div class="container">
    <div class="mark"><span>h</span></div>
    <div class="wordmark">hired<span class="dot">.</span></div>
  </div>
</div>

<!-- Varianten / Anwendungen -->
<div class="variants">

  <div class="variant">
    <div class="icon-only"><span>h</span></div>
    <div class="label">Icon</div>
  </div>

  <div class="variant dark">
    <div class="icon-only"><span>h</span></div>
    <div class="label">Icon · invers</div>
  </div>

  <div class="variant">
    <div class="word-only">hired<span class="dot">.</span></div>
    <div class="label">Wortmarke</div>
  </div>

  <div class="variant">
    <div class="stacked">
      <div class="mark"><span>h</span></div>
      <div class="wordmark">hired<span class="dot">.</span></div>
    </div>
    <div class="label">Stacked</div>
  </div>

</div>

</body>
</html>
